<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body style="background-color: green;">
    <h1>Pengelolaan Data Mahasiswa</h1>
    <form>
      <pre>
    Nama Anda       : <input type="text" name="nama">
    Alamat          : <textarea name="Alamat" rows="3" cols="20"></textarea> <br>

    Jenis Kelamin   : <input type="radio" name="jk" value="laki-laki">Laki-laki <input type="radio" name="jk" value="Perempuan">Perempuan <br>

    Pekerjaan       : <select name="Pekerjaan">Pekerjaan
        <option value="Pelajar">Pelajar</option>
        <option value="Pengajar">Pengajar</option>
        <option value="Karyawan">Karyawan</option>
        <option value="Pengangguran">Pengangguran</option>
    </select>
    <br>
    Hobi            : <input type="checkbox" value="Mobil">Mobil <input type="checkbox" value="Motor">Motor<input type="checkbox" value="Pesawat">Pesawat<input type="checkbox" value="Sepeda">Sepeda <br>

    <input type="submit" value="Kirim"><input type="submit" value="Batal"">
        </pre>
    </form>
  </body>
</html>
