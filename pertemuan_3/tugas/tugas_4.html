<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <title>Document</title>
  </head>
  <style>
    * {
      font-family: Poppins, sans-serif;
      letter-spacing: -0.2px;
    }

    .navbar {
      overflow: hidden;
      background-color: #202020;
      border-radius: 8px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .navbar a {
      font-size: 16px;
      color: #727272;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
    }

    .dropdown {
      overflow: hidden;
    }

    .dropdown .dropbtn {
      font-size: 16px;
      border: none;
      outline: none;
      color: #727272;
      padding: 14px 16px;
      background-color: inherit;
      font-family: inherit;
      margin: 0;
    }

    .navbar a:hover,
    .dropdown:hover .dropbtn {
      color: white;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #252525;
      min-width: 160px;
      box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
      z-index: 1;
      border-radius: 8px;
      overflow: hidden;
    }

    .dropdown-content a {
      float: none;
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      text-align: left;
    }

    .dropdown-content a:hover {
      background-color: #353535;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }
  </style>
  <body>
    <div class="navbar">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <div class="dropdown">
        <button class="dropbtn">Services ▾</button>
        <div class="dropdown-content">
          <a href="#">Hosting</a>
          <a href="#">Domain</a>
          <a href="#">Website</a>
        </div>
      </div>
      <a href="#about">Login</a>
    </div>
    <script src="js/bootstrap.min.js"></script>
  </body>
</html>
