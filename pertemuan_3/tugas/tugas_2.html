<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      font-family: Poppins, sans-serif;
      letter-spacing: -0.2px;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 40rem;
      border: 8px solid #000;
    }

    section {
      padding: 1rem;
    }

    form .inputs label {
      font-weight: bold;
    }

    form .inputs input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      display: inline-block;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background-color: #f1f1f1;
    }

    form .inputs input::placeholder {
      color: #b9b9b9;
      font-weight: 600;
      font-size: 12px;
    }

    form .inputs {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1rem 0;
    }

    .terms,
    .sign-in {
      color: #2779d5;
      font-weight: 600;
    }

    .cta {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1rem 0;
    }

    .cta .button {
      background-color: #5db762;
      color: white;
      padding: 14px 20px;
      border: none;
      cursor: pointer;
    }

    .bottom {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 0;
      background-color: #f1f1f1;
    }
  </style>
  <body>
    <div class="container">
      <form action="">
        <section>
          <header>
            <h1 class="title">Register</h1>
            <p class="description">
              Please fill in this form to create an account.
            </p>
          </header>
          <hr />
          <div class="inputs">
            <div class="email">
              <label for="email">Email:</label><br />
              <input
                type="email"
                placeholder="Enter Email"
                id="email"
                name="email"
                required
              />
            </div>
            <div class="password">
              <label for="password">Password:</label><br />
              <input
                type="password"
                placeholder="Enter Password"
                id="password"
                name="password"
                required
              />
            </div>
            <div class="repeat-password">
              <label for="repeat-password">Repeat password:</label><br />
              <input
                type="password"
                placeholder="Repeat Password"
                id="repeat-password"
                name="repeat-password"
                required
              />
            </div>
          </div>
          <hr />
          <div class="cta">
            <span
              >By creating an account, you agree to our
              <a href="" class="terms">Terms & Privacy</a></span
            >
            <input class="button" type="submit" value="Register" />
          </div>
        </section>
        <div class="bottom">
          <span
            >Already have an account?
            <a href="" class="sign-in">Sign In.</a></span
          >
        </div>
      </form>
    </div>
  </body>
</html>
